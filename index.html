<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  color: #222;
  min-height: 100vh;
}

.container {
  max-width: 560px;
  margin: 0 auto;
  padding: 20px 16px;
}

h1 {
  text-align: center;
  font-size: 24px;
  color: #1a1a2e;
  margin: 20px 0 8px;
}

.subtitle {
  text-align: center;
  color: #888;
  font-size: 14px;
  margin-bottom: 24px;
}

#input {
  width: 100%;
  min-height: 120px;
  padding: 14px;
  border: 2px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  outline: none;
  resize: vertical;
  background: #fff;
  color: #222;
  box-sizing: border-box;
}
#input:focus { border-color: #1976d2; }

#preview {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#qrBox {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  display: none;
}

#qrBox canvas {
  display: block;
  max-width: 100%;
  height: auto !important;
}

.empty {
  color: #aaa;
  font-size: 15px;
  text-align: center;
  padding: 40px 0;
}

#info {
  color: #888;
  font-size: 13px;
}

.sizes {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.size-btn {
  padding: 6px 14px;
  border: 1px solid #ddd;
  border-radius: 6px;
  background: #fff;
  color: #555;
  font-size: 13px;
  cursor: pointer;
}
.size-btn.active {
  border-color: #1976d2;
  color: #1976d2;
  background: #e3f2fd;
}

.actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}
.btn-primary { background: #1976d2; color: #fff; }
.btn-primary:hover { background: #1565c0; }
.btn-primary:disabled { background: #ccc; }
.btn-secondary { background: #e0e0e0; color: #333; }
.btn-secondary:hover { background: #d0d0d0; }
.btn-secondary:disabled { background: #eee; color: #aaa; }
</style>
</head>
<body>

<div class="container">
  <h1>📱 QR Code</h1>
  <p class="subtitle">輸入任何內容，即時產生 QR Code</p>

  <textarea id="input" placeholder="輸入網址、文字、電話、任何內容..." autofocus></textarea>

  <div id="info"></div>

  <div id="preview">
    <div class="empty" id="empty">📲 輸入內容後 QR Code 自動出現</div>
    <div id="qrBox"></div>
    <div class="sizes" id="sizes" style="display:none">
      <button class="size-btn" data-s="256" onclick="setSize(256)">S</button>
      <button class="size-btn active" data-s="384" onclick="setSize(384)">M</button>
      <button class="size-btn" data-s="512" onclick="setSize(512)">L</button>
      <button class="size-btn" data-s="768" onclick="setSize(768)">XL</button>
    </div>
    <div class="actions" id="actions" style="display:none">
      <button class="btn btn-primary" onclick="download()">⬇ 下載 PNG</button>
      <button class="btn btn-secondary" onclick="copyImg()">📋 複製圖片</button>
    </div>
  </div>
</div>

<script>
const input = document.getElementById('input');
const qrBox = document.getElementById('qrBox');
const empty = document.getElementById('empty');
const info = document.getElementById('info');
const sizesDiv = document.getElementById('sizes');
const actionsDiv = document.getElementById('actions');

let size = 384;
let timer;

function generate() {
  const text = input.value;
  info.textContent = text ? text.length + ' 字元' : '';

  if (!text.trim()) {
    qrBox.style.display = 'none';
    empty.style.display = '';
    sizesDiv.style.display = 'none';
    actionsDiv.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  qrBox.style.display = '';
  sizesDiv.style.display = '';
  actionsDiv.style.display = '';
  qrBox.innerHTML = '';

  try {
    // qrcode-generator API
    const typeNumber = 0; // auto
    const errorCorrectionLevel = 'M';
    const qr = qrcode(typeNumber, errorCorrectionLevel);
    qr.addData(text);
    qr.make();

    // Create canvas manually
    const cellSize = Math.floor(size / qr.getModuleCount());
    const actualSize = cellSize * qr.getModuleCount();
    const canvas = document.createElement('canvas');
    canvas.width = actualSize;
    canvas.height = actualSize;
    const ctx = canvas.getContext('2d');

    // White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, actualSize, actualSize);

    // Black modules
    ctx.fillStyle = '#000000';
    for (let row = 0; row < qr.getModuleCount(); row++) {
      for (let col = 0; col < qr.getModuleCount(); col++) {
        if (qr.isDark(row, col)) {
          ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }
    }

    qrBox.appendChild(canvas);
  } catch (e) {
    info.textContent = '錯誤：' + e.message;
  }
}

function setSize(s) {
  size = s;
  document.querySelectorAll('.size-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.s) === s);
  });
  if (input.value.trim()) generate();
}

function download() {
  const canvas = qrBox.querySelector('canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.download = 'qrcode.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function copyImg() {
  const canvas = qrBox.querySelector('canvas');
  if (!canvas) return;
  canvas.toBlob(blob => {
    navigator.clipboard.write([new ClipboardItem('image/png', blob)]).then(() => {
      info.textContent = '✅ 已複製到剪貼簿';
      setTimeout(() => { if (input.value.trim()) info.textContent = input.value.length + ' 字元'; }, 1500);
    }).catch(() => {
      info.textContent = '複製失敗，請用下載';
    });
  });
}

input.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(generate, 200);
});

// Auto resize textarea
input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});
</script>
</body>
</html>
